<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm | GUNPLA STORE</title>
    <meta name="description" content="Chi tiết sản phẩm Gunpla chính hãng, thông tin kho, giá và nhà cung cấp.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Open+Sans:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header scrolled" id="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <i class='bx bx-hive'></i>
                <span class="logo-text">GUNPLA<span class="highlight">STORE</span></span>
            </a>

            <div class="nav-menu" id="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">TRANG CHỦ</a></li>
                    <li class="nav-item"><a href="store.html" class="nav-link">CỬA HÀNG</a></li>
                    <li class="nav-item"><a href="guide.html" class="nav-link">HƯỚNG DẪN</a></li>
                    <li class="nav-item"><a href="lien-he.html" class="nav-link">LIÊN HỆ</a></li>
                </ul>
                <div class="nav-close" id="nav-close">
                    <i class='bx bx-x'></i>
                </div>
            </div>

            <div class="nav-tools">
                <div class="search-box">
                    <input type="text" placeholder="Tìm kiếm Gunpla..." class="search-input">
                    <i class='bx bx-target-lock search-icon'></i>
                </div>
                <a href="#" class="cart-icon">
                    <i class='bx bx-cart-alt'></i>
                    <span class="cart-count">0</span>
                </a>
                <a href="login.html" class="user-icon">
                    <i class='bx bx-user-circle'></i>
                </a>
                <div class="nav-toggle" id="nav-toggle">
                    <i class='bx bx-menu-alt-right'></i>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <section class="store-section section">
            <div class="container">
                <div class="product-detail-header">
                    <a href="store.html" class="btn btn-secondary"><i class='bx bx-arrow-back'></i> Quay về cửa hàng</a>
                </div>

                <div class="product-detail-content" id="product-detail-content">
                    <div class="product-detail-loading">
                        <p>Đang tải chi tiết sản phẩm...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer-minimal">
        <div class="container">
            <div class="footer-top">
                <a href="#" class="logo">
                    <i class='bx bx-hive'></i>
                    <span class="logo-text">GUNPLA<span class="highlight">STORE</span></span>
                </a>
                <div class="sys-info">
                    <span>SYS.VER: 2.1.0</span>
                    <span>NET: SECURE</span>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 G-STORE NETWORK. ALL RIGHTS RESERVED.</p>
            </div>
        </div>
    </footer>

    <script src="js/product.js"></script>
</body>

</html>
