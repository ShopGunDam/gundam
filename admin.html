<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN TRỊ VIÊN | GUNPLA STORE SYSTEM</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Open+Sans:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body class="admin-body">
    <!-- Check if admin is logged in (handled by JS) -->
    <div id="auth-overlay" class="modal-overlay" style="display: flex; background: #05070a;">
        <div class="loader-content" style="text-align: center;">
            <div class="system-label"><span class="status-dot"></span> XÁC MINH QUYỀN TRUY CẬP...</div>
            <div class="glitch" data-text="AUTHENTICATING">AUTHENTICATING</div>
        </div>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo">
                <i class='bx bx-hive'></i>
                <span class="logo-text">G-SYSTEM <span class="highlight">ADMIN</span></span>
            </a>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-item">
                <a class="menu-link active" data-view="overview">
                    <i class='bx bx-grid-alt'></i>
                    <span>TỔNG QUAN</span>
                </a>
            </div>
            <div class="menu-item">
                <a class="menu-link" data-view="warehouse">
                    <i class='bx bx-package'></i>
                    <span>KHO HÀNG</span>
                </a>
            </div>
            <div class="menu-item">
                <a class="menu-link" data-view="accounts">
                    <i class='bx bx-user-voice'></i>
                    <span>TÀI KHOẢN</span>
                </a>
            </div>
            <div class="menu-item">
                <a class="menu-link" data-view="invoices">
                    <i class='bx bx-receipt'></i>
                    <span>HÓA ĐƠN</span>
                </a>
            </div>
            <div class="menu-item">
                <a class="menu-link" data-view="settings">
                    <i class='bx bx-cog'></i>
                    <span>CÀI ĐẶT</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="menu-item">
                <a class="menu-link" id="logout-btn" style="color: var(--secondary-color);">
                    <i class='bx bx-log-out-circle'></i>
                    <span>ĐĂNG XUẤT</span>
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <div id="main-content">
            <!-- Dynamic content will be injected here -->
            <div class="page-header">
                <h2 class="admin-title">ĐANG TẢI DỮ LIỆU...</h2>
            </div>
        </div>
    </main>

    <!-- Global Modals (Add/Edit) -->
    <div id="modal-container" class="modal-overlay">
        <!-- Content injected by JS -->
    </div>

    <!-- Scripts -->
    <script src="admin.js"></script>
</body>

</html>
